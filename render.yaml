databases:
  - name: lettfaktura-db
    databaseName: lettfaktura
    user: lettfaktura
    plan: free

services:
  - type: web
    name: lettfaktura-be
    runtime: node
    rootDir: BE
    plan: free
    buildCommand: npm install
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: lettfaktura-db
          property: connectionString
      - key: CORS_ORIGIN
        value: https://lettfaktura-fe.onrender.com

  - type: static
    name: lettfaktura-fe
    rootDir: FE
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://lettfaktura-be.onrender.com/api
